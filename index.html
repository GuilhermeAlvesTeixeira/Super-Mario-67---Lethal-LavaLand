<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mario 67</title>
  <link rel="icon" type="image/x-icon" href="/Images/mario.ico">
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

  <div id="container"></div>

  <div id="hud">
    <h2>Controles</h2>

    <div><b>W A S D</b> - Movimentação</div>
    <div><b>Mouse</b> - Camera</div>
    <div><b>Space</b> - Pular</div>
    <div><b>Shift</b> - Correr</div>
    <div><b>Clique Mouse</b> - Bola de Fogo</div>
    <div><b>R</b> - Respawnar Jogador</div>

    <br>

    <small>Clique em qualquer lugar para começar</small>
  </div>

  <style>
    body{
        margin:0;
        overflow:hidden;
        font-family: "Mario64", sans-serif;
    }

    #hud{
        position:absolute;

        top:20px;
        left:20px;

        padding:16px 22px;

        background:rgba(0,0,0,0.55);

        color:white;

        border:2px solid rgba(255,255,255,0.15);

        border-radius:10px;

        backdrop-filter:blur(4px);

        pointer-events:none;

        z-index:100;
    }

    #hud h2{

        margin:0 0 10px 0;

        color:#ffd34d;

        font-size:22px;
    }

    #hud div{

        margin:6px 0;

        font-size:18px;
    }

    #hud small{

        color:#cccccc;
    }

  @font-face {
    font-family: "Mario64";
    src: url("/Fonts/mario64/Mario64.ttf") format("truetype");
    font-weight: normal;
    font-style: normal;
  }

  </style>
  
  <script type="module" src="/src/main.js"></script>
  <script type="importmap">
			{
				"imports": {
					"three": "../build/three.module.js",
					"three/addons/": "./jsm/"
				}
			}
	</script>
</body>
</html>
